<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 span { font-size: 18px; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #333;
    }
    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #555;
      border-radius: 22px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider {
      background: #8ab4f8;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
    .status {
      font-size: 11px;
      color: #888;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2><span>🌙</span> Dark Mode for Docs</h2>
  <div class="toggle-row">
    <span class="toggle-label">Enable dark mode</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status">Active on docs.google.com</div>
  <script src="popup.js"></script>
</body>
</html>
